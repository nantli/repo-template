        body: |
          рҹҸ· ( work: complicated рҹҳ¬ )
          "Complicated" problems might have several "correct" solutions. Here, there is a clear relationship between cause and effect, but it may not be visible to everyone, because the problem is... complicated. 

          The decision-making approach here is to "Sense then Analyze then Respond." In other words, you need to assess the situation, analyze what is known (often with the help of experts), and decide on the best response, using good practice.
      pr:
