  - name: "work: complex рҹҳі"
    labeled:
      issue:
        body: |
          рҹҸ· ( work: complex рҹҳі )
          It might be impossible to identify one "correct" solution, or spot cause-and-effect relationships, in "complex" situations.

          Complex contexts are often unpredictable, and the best approach here is to "Probe then Sense then Respond." Rather than trying to control the situation or insisting on a plan of action, it's often best to be patient, look for patterns, and encourage a solution to emerge.
